name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Re-structure Project
        run: |
          mkdir -p app/src/main/java/com/cyberpunk/vpn
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-anydpi
          
          # Move Kotlin files
          mv *.kt app/src/main/java/com/cyberpunk/vpn/ 2>/dev/null || true
          
          # Move XML files
          mv activity_main.xml app/src/main/res/layout/ 2>/dev/null || true
          mv strings.xml themes.xml colors.xml app/src/main/res/values/ 2>/dev/null || true
          mv ic_launcher_background.xml app/src/main/res/mipmap-anydpi/ 2>/dev/null || true
          mv AndroidManifest.xml app/src/main/src/main/ 2>/dev/null || true
          
          # Move config files
          mv google-services.json backup_rules.xml data_extraction_rules.xml app/ 2>/dev/null || true

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberVPN-Final
          path: app/build/outputs/apk/debug/*.apk
