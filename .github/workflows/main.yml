name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x vpn_app/gradlew
      - name: Build with Gradle
        run: cd vpn_app && ./gradlew assembleDebug
      - name: Upload assembleDebug
        uses: actions/upload-artifact@v4
        with:
          name: CyberVPN-v1
          path: vpn_app/app/build/outputs/apk/debug/*.apk
          
